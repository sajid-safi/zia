<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{

background:#f4f6f9;
color:#222;
line-height:1.6;

}

/* HEADER */

header{

background:#003366;
color:white;

padding:30px 20px;

text-align:center;

box-shadow:0 2px 10px rgba(0,0,0,.15);

}

header h1{

font-size:35px;
margin-bottom:8px;

}

header p{

font-size:17px;

opacity:.9;

}

/* GALLERY */

.gallery{

padding:60px 5%;

}

.gallery-title{

text-align:center;

font-size:34px;

margin-bottom:45px;

color:#003366;

}

.gallery-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.card{

background:white;

overflow:hidden;

box-shadow:
0 5px 15px rgba(0,0,0,.12);
transition:.3s;

}

.card:hover{

transform:translateY(-6px);
box-shadow:
0 10px 25px rgba(0,0,0,.18);

}

.card img{

width:100%;
height:320px;
object-fit:cover;
display:block;

}

/* BUTTON */

.button-center{

text-align:center;

margin-top:50px;

}

.btn{

display:inline-block;

padding:14px 32px;

background:#0077cc;

color:white;

text-decoration:none;

font-weight:bold;

border-radius:8px;

transition:.3s;

}

.btn:hover{

background:#005fa3;

}

/* FOOTER */

footer{

background:#111;

color:white;

text-align:center;

padding:25px;

margin-top:60px;

}

/* MOBILE */

@media(max-width:768px){

header h1{

font-size:26px;

}

.gallery-title{

font-size:28px;

}

.card img{

height:260px;
border-radius: 7%;

}

}

</style>

</head>
