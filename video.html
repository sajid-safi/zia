/* ===== RESET ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

body{

background:#f4f6f9;

color:#222;

line-height:1.6;

/* ===== HEADER ===== */

header{

background:#003366;

color:white;

padding:30px;

text-align:center;

/* ===== VIDEO SECTION ===== */

.section-title{

font-size:34px;

color:#003366;

margin-bottom:45px;

}

.video-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:25px;

}

/* ===== VIDEO CARD ===== */

.video-card{

background:white;

border-radius:12px;

overflow:hidden;

box-shadow:
0 5px 15px rgba(0,0,0,.12);

transition:.3s;

padding:10px;

}

.video-card:hover{

transform:translateY(-6px);

box-shadow:
0 10px 25px rgba(0,0,0,.18);

}

.video-card video{

width:100%;

height:240px;

object-fit:cover;

border-radius:8px;

}

/* ===== BUTTON ===== */

.button-center{

text-align:center;

margin-top:50px;

}

.btn{

display:inline-block;

padding:14px 35px;

background:#0077cc;

color:white;

text-decoration:none;

font-weight:bold;

border-radius:8px;

transition:.3s;

}

.btn:hover{

background:#005fa3;

}

/* ===== FOOTER ===== */

footer{

background:#111;

color:white;

text-align:center;

padding:25px;

margin-top:60px;

}

/* ===== MOBILE ===== */

@media(max-width:768px){

header h1{

font-size:26px;

}

.section-title{

font-size:28px;

}

.video-card video{

height:220px;

}

}

</style>
